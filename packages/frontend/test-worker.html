<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SGP4 Worker Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      padding: 24px;
    }
    h1 { color: #58a6ff; margin-bottom: 16px; font-size: 16px; letter-spacing: 0.05em; }
    #log {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      white-space: pre-wrap;
      line-height: 1.7;
      min-height: 200px;
    }
    .pass  { color: #3fb950; }
    .fail  { color: #f85149; }
    .info  { color: #8b949e; }
    .group { color: #d29922; font-weight: bold; }
    .note  { color: #58a6ff; }
    p.hint { margin-top: 12px; color: #8b949e; font-size: 11px; }
  </style>
</head>
<body>
  <h1>SGP4 Worker Test</h1>
  <div id="log"><span class="info">Starting…</span>
</div>
  <p class="hint">Open DevTools console for raw output. This page mirrors it.</p>

  <script type="module">
    const logEl = document.getElementById('log');
    logEl.textContent = '';

    function append(text, cls) {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = text + '\n';
      logEl.appendChild(span);
    }

    // Intercept console methods to mirror output on screen
    const _log   = console.log.bind(console);
    const _error = console.error.bind(console);
    const _group = console.group.bind(console);
    const _groupEnd = console.groupEnd.bind(console);

    let depth = 0;
    function indent() { return '  '.repeat(depth); }

    console.group = (...args) => {
      _group(...args);
      append(indent() + args.join(' '), 'group');
      depth++;
    };
    console.groupEnd = () => {
      _groupEnd();
      depth = Math.max(0, depth - 1);
    };
    console.log = (...args) => {
      _log(...args);
      const text = args.join(' ');
      const cls = text.startsWith('✅') ? 'pass'
                : text.startsWith('Worker terminated') ? 'note'
                : 'info';
      append(indent() + text, cls);
    };
    console.error = (...args) => {
      _error(...args);
      append(indent() + args.join(' '), 'fail');
    };
  </script>

  <!-- Run the actual test (must come after the console overrides) -->
  <script type="module" src="/tests/testWorker.ts"></script>
</body>
</html>
